name: user-service CI
on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
jobs:
  build:
    name: "Setup & Build"
    runs-on: ubuntu-latest
    steps:
      - name: Setup java
        uses: actions/setup-java@v5
        with:
          distribution: 'corretto'
          java-version: '21'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Build
        run: ./gradlew clean build -x test
      - name: list files
        run: ls -lrt





